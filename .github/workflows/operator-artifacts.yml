name: Operator Artifacts

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package artifact to build
        required: true
        type: choice
        options:
          - copybot-app
          - copybot-operators
          - copybot-storage-ops
          - copybot-discovery-v2
          - copybot-discovery-ops
          - copybot-live-ops

permissions:
  contents: read

concurrency:
  group: operator-artifacts-${{ github.ref }}-${{ inputs.package }}
  cancel-in-progress: true

jobs:
  artifact:
    name: ${{ inputs.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ARTIFACT_ARCH: linux-x86_64
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: target/artifacts/${{ inputs.package }}
      FORCE: "1"
      PACKAGE: ${{ inputs.package }}
      TARGET: x86_64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rust versions
        run: |
          rustc --version
          cargo --version

      - name: Resolve architecture guard range
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            range="HEAD^..HEAD"
          else
            empty_tree="$(git hash-object -t tree /dev/null)"
            range="$empty_tree..HEAD"
          fi
          echo "ARCH_GUARD_DIFF_RANGE=$range" >> "$GITHUB_ENV"
          echo "architecture_guard_range=$range"

      - name: Resolve package settings
        shell: bash
        run: |
          set -euo pipefail
          case "$PACKAGE" in
            copybot-app)
              profile="release"
              ;;
            copybot-operators | copybot-storage-ops | copybot-discovery-v2 | copybot-discovery-ops | copybot-live-ops)
              profile="operator-release"
              ;;
            *)
              echo "unsupported package: $PACKAGE" >&2
              exit 1
              ;;
          esac
          wanted_bins="$(python3 tools/package_bins.py --package "$PACKAGE" | xargs)"
          if [ -z "$wanted_bins" ]; then
            echo "no package binaries found for $PACKAGE" >&2
            exit 1
          fi
          run_checks="1"
          echo "PROFILE=$profile" >> "$GITHUB_ENV"
          echo "RUN_CHECKS=$run_checks" >> "$GITHUB_ENV"
          echo "WANTED_BINS=$wanted_bins" >> "$GITHUB_ENV"
          echo "profile=$profile run_checks=$run_checks package=$PACKAGE bins=$wanted_bins"

      - name: Cache cargo state
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target/artifacts/${{ inputs.package }}
          key: cargo-artifact-${{ runner.os }}-${{ inputs.package }}-${{ hashFiles('Cargo.lock', 'rust-toolchain*', '.cargo/**') }}
          restore-keys: |
            cargo-artifact-${{ runner.os }}-${{ inputs.package }}-
            cargo-artifact-${{ runner.os }}-

      - name: Build, test, and package artifact
        run: tools/build_operator_artifacts.sh

      - name: Verify packaged artifact
        run: |
          python3 tools/verify_operator_artifact.py \
            artifacts/linux-x86_64/$PACKAGE-${{ github.sha }} \
            --expect-package "$PACKAGE" \
            --expect-profile "$PROFILE" \
            --expect-target "$TARGET" \
            --enforce-workspace-bin-check

      - name: Dry-run operator install
        shell: bash
        run: |
          install_root="$(mktemp -d)"
          mkdir -p "$install_root/bin"
          trap 'rm -rf "$install_root"' EXIT
          tools/install_operator_artifacts.sh \
            --dry-run \
            --expect-package "$PACKAGE" \
            --expect-profile "$PROFILE" \
            --expect-target "$TARGET" \
            --install-dir "$install_root/bin" \
            artifacts/linux-x86_64/$PACKAGE-${{ github.sha }}.tar.gz

      - name: Temp install and rollback proof
        shell: bash
        run: |
          set -euo pipefail
          install_root="$(mktemp -d)"
          install_dir="$install_root/bin"
          mkdir -p "$install_dir"
          trap 'rm -rf "$install_root"' EXIT
          artifact="artifacts/linux-x86_64/$PACKAGE-${{ github.sha }}.tar.gz"
          artifact_dir="artifacts/linux-x86_64/$PACKAGE-${{ github.sha }}"
          artifact_id="$PACKAGE-${{ github.sha }}"
          previous_sha="0000000000000000000000000000000000000001"
          previous_id="$PACKAGE-${previous_sha}"
          previous_only_bin="previous_only_bin"
          previous_release="$install_dir/releases/$previous_id"
          mkdir -p "$previous_release" "$install_dir/packages/$PACKAGE"
          cp "$artifact_dir"/build-manifest.json "$previous_release"/
          cp "$artifact_dir"/SHA256SUMS "$previous_release"/
          if [ -f "$artifact_dir/migrations.tar.gz" ]; then
            cp "$artifact_dir"/migrations.tar.gz "$previous_release"/
          fi
          for bin in $WANTED_BINS; do
            cp "$artifact_dir/$bin" "$previous_release/$bin"
          done
          python3 - "$previous_release" "$previous_id" "$previous_sha" "$previous_only_bin" "$PACKAGE" <<'PY'
          import hashlib
          import json
          import pathlib
          import sys

          release = pathlib.Path(sys.argv[1])
          path = release / "build-manifest.json"
          previous_only_bin = sys.argv[4]
          package = sys.argv[5]
          data = json.loads(path.read_text())
          data["artifact_id"] = sys.argv[2]
          data["git_sha"] = sys.argv[3]
          data["expected_binaries"] = sorted(set(data["expected_binaries"] + [previous_only_bin]))
          data["binaries"].append(
              {"name": previous_only_bin, "source_package": package, "sha256": ""}
          )
          sums = []
          for item in data["binaries"]:
              binary = release / item["name"]
              binary.write_text(f"#!/usr/bin/env sh\nprintf '%s\\n' previous-{item['name']}\n")
              binary.chmod(0o755)
              digest = hashlib.sha256(binary.read_bytes()).hexdigest()
              item["sha256"] = digest
              sums.append(f"{digest}  {item['name']}\n")
          bundle = data.get("migration_bundle")
          if bundle:
              sums.append(f"{bundle['sha256']}  {bundle['name']}\n")
          path.write_text(json.dumps(data, indent=2, sort_keys=True) + "\n")
          (release / "SHA256SUMS").write_text("".join(sums))
          PY
          printf '%s\n' "$previous_id" > "$previous_release/INSTALL_COMPLETE"
          ln -s "../../releases/$previous_id" "$install_dir/packages/$PACKAGE/current"
          ln -s "packages/$PACKAGE/current/build-manifest.json" "$install_dir/operator-artifact-current-$PACKAGE.json"
          for bin in $WANTED_BINS; do
            ln -s "packages/$PACKAGE/current/$bin" "$install_dir/$bin"
          done
          ln -s "packages/$PACKAGE/current/$previous_only_bin" "$install_dir/$previous_only_bin"
          rm "$install_dir/$previous_only_bin"
          printf '%s\n' stale > "$install_dir/$previous_only_bin"
          if tools/install_operator_artifacts.sh \
            --expect-package "$PACKAGE" \
            --expect-profile "$PROFILE" \
            --expect-target "$TARGET" \
            --install-dir "$install_dir" \
            "$artifact"; then
            echo "install unexpectedly succeeded with stale non-symlink previous binary" >&2
            exit 1
          fi
          python3 - "$install_dir/operator-artifact-current-$PACKAGE.json" "$previous_id" <<'PY'
          import json
          import sys

          with open(sys.argv[1]) as fh:
              actual = json.load(fh)["artifact_id"]
          assert actual == sys.argv[2], (actual, sys.argv[2])
          PY
          rm "$install_dir/$previous_only_bin"
          ln -s "packages/$PACKAGE/current/$previous_only_bin" "$install_dir/$previous_only_bin"
          first_bin="${WANTED_BINS%% *}"
          mkdir "$install_dir/$first_bin.new"
          if tools/install_operator_artifacts.sh \
            --expect-package "$PACKAGE" \
            --expect-profile "$PROFILE" \
            --expect-target "$TARGET" \
            --install-dir "$install_dir" \
            "$artifact"; then
            echo "install unexpectedly succeeded with stale scratch directory" >&2
            exit 1
          fi
          rmdir "$install_dir/$first_bin.new"
          python3 - "$install_dir/operator-artifact-current-$PACKAGE.json" "$previous_id" <<'PY'
          import json
          import sys

          with open(sys.argv[1]) as fh:
              actual = json.load(fh)["artifact_id"]
          assert actual == sys.argv[2], (actual, sys.argv[2])
          PY
          tools/install_operator_artifacts.sh \
            --expect-package "$PACKAGE" \
            --expect-profile "$PROFILE" \
            --expect-target "$TARGET" \
            --install-dir "$install_dir" \
            "$artifact"
          test -f "$install_dir/releases/$artifact_id/INSTALL_COMPLETE"
          test -L "$install_dir/packages/$PACKAGE/current"
          test -L "$install_dir/operator-artifact-current-$PACKAGE.json"
          if [ "$PACKAGE" = "copybot-app" ]; then
            test -L "$install_root/migrations"
            test "$(readlink "$install_root/migrations")" = "bin/packages/copybot-app/current/migrations"
            test -d "$install_dir/packages/copybot-app/current/migrations"
          fi
          for bin in $WANTED_BINS; do
            test -x "$install_dir/$bin"
          done
          test ! -e "$install_dir/$previous_only_bin"
          test ! -L "$install_dir/$previous_only_bin"
          python3 - "$install_dir/operator-artifact-current-$PACKAGE.json" "$artifact_id" <<'PY'
          import json
          import sys

          with open(sys.argv[1]) as fh:
              actual = json.load(fh)["artifact_id"]
          assert actual == sys.argv[2], (actual, sys.argv[2])
          PY
          tools/install_operator_artifacts.sh \
            --expect-package "$PACKAGE" \
            --expect-profile "$PROFILE" \
            --expect-target "$TARGET" \
            --install-dir "$install_dir" \
            --rollback "$previous_id"
          python3 - "$install_dir/operator-artifact-current-$PACKAGE.json" "$previous_id" <<'PY'
          import json
          import sys

          with open(sys.argv[1]) as fh:
              actual = json.load(fh)["artifact_id"]
          assert actual == sys.argv[2], (actual, sys.argv[2])
          PY
          for bin in $WANTED_BINS; do
            test -x "$install_dir/$bin"
          done
          if [ "$PACKAGE" = "copybot-app" ]; then
            test -L "$install_root/migrations"
            test "$(readlink "$install_root/migrations")" = "bin/packages/copybot-app/current/migrations"
            test -d "$install_dir/packages/copybot-app/current/migrations"
          fi
          test -x "$install_dir/$previous_only_bin"

      - name: Upload operator artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: ${{ inputs.package }}-${{ github.sha }}-linux-x86_64
          path: |
            artifacts/linux-x86_64/${{ inputs.package }}-${{ github.sha }}/
            artifacts/linux-x86_64/${{ inputs.package }}-${{ github.sha }}.tar.gz
            artifacts/linux-x86_64/${{ inputs.package }}-${{ github.sha }}.tar.gz.sha256
          retention-days: 14
